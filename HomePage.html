<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-image:
                url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        /* 
        Modified the button position to center it. 
        Although I still think it's better to place it in the middle, 
        you can adjust the position below yourselves if you find it unattractive.
        */
        .enter-button {
            position: absolute;
            /*left: 50%;*/
            left: 20%;
            /*bottom: 30%;*/
            bottom: 20%;
            /*transform: translateX(-50%);*/
            transform: translateX(-50%) translateY(0);
            background-color: #1a73e8;
            color: white;
            padding: 20px 50px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            min-width: 380px;
            text-align: center;
            z-index: 10;
        }

        .enter-button:hover {
            background-color: #0d5bb5;
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* intro-textarea */
        .introduction-section {
            position: relative;
            z-index: 2;
            margin-top: 100vh;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 20px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
        }

        .introduction-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .introduction-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }

        .section-title {
            font-size: 36px;
            color: #1a73e8;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
        }

        .intro-text {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            text-align: center;
        }

        .intro-text p {
            margin-bottom: 20px;
        }

        .placeholder-text {
            font-size: 20px;
            color: #666;
            text-align: center;
            line-height: 2;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        /* Home Screen Container */
        .main-screen {
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="logo">Lingshui Used Car Market</div>

    <!-- main screen area -->
    <div class="main-screen"><a href="search.html" class="enter-button">Enter Lingshui CarMarketplace</a></div>

    <!-- Introduction Text Area -->
	/*Please replace the placeholders below directly with the text.*/
    <section class="introduction-section" id="introduction">
        <div class="introduction-content">
            <h2 class="section-title">About Lingshui Used Car Market</h2>
            <div class="intro-text">
                <div class="placeholder-text">
                    <p>##############################</p>
                    <p>##############################</p>
                    <p>##############################</p>
                    <p>##############################</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Scroll-down fade-in effect script
        document.addEventListener('DOMContentLoaded',
            function () {
                const introSection = document.getElementById('introduction');

                // Listen to the scroll event
                window.addEventListener('scroll',
                    function () {
                        const sectionTop = introSection.getBoundingClientRect().top;
                        const windowHeight = window.innerHeight;

                        // Show when the introduction area enters the viewport.
                        if (sectionTop < windowHeight * 0.8) {
                            introSection.classList.add('visible');
                        }
                    });

                // Check once when the page loads (if the page has already scrolled).
                const sectionTop = introSection.getBoundingClientRect().top;
                const windowHeight = window.innerHeight;
                if (sectionTop < windowHeight * 0.8) {
                    introSection.classList.add('visible');
                }
            });
    </script>
</body>
    
</html>
