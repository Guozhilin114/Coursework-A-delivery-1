<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details - Used Car Marketplace</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">CarMarket</div>
            <div class="nav-links">
                <a href="seller-login.html">Seller Login</a>
                <a href="upload.html">Upload Car</a>
            </div>
        </header>
        
        <a href="search.html" class="back-link">← Back to Search</a>
        
        <div class="car-detail">
            <img src="" alt="Car Image" id="carImage">
            
            <h1 id="carTitle">Car Title Loading...</h1>
            <div id="carPrice">Price</div>
            
            <div class="car-specs">
                <div class="spec-item"><strong>Brand:</strong> <span id="carBrand"></span></div>
                <div class="spec-item"><strong>Model:</strong> <span id="carModel"></span></div>
                <div class="spec-item"><strong>Year:</strong> <span id="carYear"></span></div>
                <div class="spec-item"><strong>Mileage:</strong> <span id="carMileage"></span></div>
                <div class="spec-item"><strong>Color:</strong> <span id="carColor"></span></div>
                <div class="spec-item"><strong>Location:</strong> <span id="carLocation"></span></div>
            </div>
            
            <div class="car-description">
                <h2>Description</h2>
                <p id="carDescription">Loading description...</p>
            </div>
            
            <div class="contact-seller">
                <h2>Contact Seller</h2>
                <button class="contact-btn">Contact Seller</button>
            </div>
        </div>
    </div>
</body>
</html>
