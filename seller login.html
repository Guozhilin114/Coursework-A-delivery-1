<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- Character encoding to prevent garbled text -->
<title>Seller Login</title>
<style>
body {
    background: #f0f2f5;
    /* Changed background color to soft gray*/
    padding: 20px;
    /* Added padding so content doesn't stick to browser edges */
}
h2 {
    color: black;
    margin-top: 20px;
    /* Added small margin above title */
}
a {
    color: #1a73e8;
    /* Changed link color to blue */
}
input {
    border: 1px solid black;
    padding: 5px;
    /* Added small padding */
}
button {
    background: #1a73e8;
    /* Changed button color to match links */
    color: white;
    padding: 6px 12px;
    /* Added small padding*/
}
</style>
</head>
<body>

<p>CarMarket</p>
<a href="search.html">Browse Cars</a>
<br>
<a href="upload.html">Upload Car</a>
<br><br>

<a href="search.html">← Back to Search</a>
<br><br>

<h2>Seller Login</h2>
<form id="loginForm" onsubmit="return doLogin()">
    <p>Email * <input type="email" id="email" placeholder="your@email.com"></p>
    <p>Password * <input type="password" id="password" placeholder="Enter your password"></p>
    <button type="submit">Login</button>
    <br><br>
    <p>New seller? <a href="upload.html">Register here</a></p>
</form>

<br><br>
<p>© 2026 Used Car Marketplace</p>

<script>
function doLogin() {
    var e = document.getElementById("email").value;
    var p = document.getElementById("password").value;
    
    if (e == "" || p == "") {
        alert("Please fill in all fields!");
        return false;
    }
    
    alert("Login successful! You can now upload cars.");
    window.location = "upload.html";
    return false;
}
</script>

</body>
</html>
