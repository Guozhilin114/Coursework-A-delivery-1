<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- Character encoding to prevent garbled text -->
<title>Seller Login</title>
<style>
body {
    background: #f0f2f5;
    /* Changed background color to soft gray*/
    padding: 20px;
    /* Added padding so content doesn't stick to browser edges */
}
.container {
    max-width: 500px;
    margin: 0 auto;
}
.header {
    margin-bottom: 30px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ddd;
}
.logo {
    font-size: 24px;
    font-weight: bold;
    color: #1a73e8;
    margin-bottom: 10px;
}
.nav-links a {
    color: #1a73e8;
    /* Changed link color to blue */
    text-decoration: none;
    margin-right: 20px;
}
.back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #1a73e8;
    text-decoration: none;
}
h2 {
    color: black;
    margin-bottom: 20px;
    /* Changed from margin-top to margin-bottom */
}
.form-box {
    background: white;
    padding: 25px;
    border-radius: 4px;
}
input {
    border: 1px solid #ddd;
    /* Changed border color to softer gray */
    padding: 8px;
    /* Added small padding */
    width: 100%;
    margin-top: 5px;
}
button {
    background: #1a73e8;
    /* Changed button color to match links */
    color: white;
    padding: 10px 15px;
    /* Added small padding*/
    border: none;
    border-radius: 4px;
    width: 100%;
    margin-top: 15px;
    cursor: pointer;
}
.register-link {
    text-align: center;
    margin-top: 20px;
}
.footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #ddd;
    color: #777;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
    <!--Wrapped header content -->
    <div class="header">
        <p class="logo">CarMarket</p>
        <div class="nav-links">
            <a href="search.html">Browse Cars</a>
            <a href="upload.html">Upload Car</a>
        </div>
    </div>

    <a href="search.html" class="back-link">← Back to Search</a>
    <br><br> 

    <h2>Seller Login</h2>
    <!-- Wrapped form in white box -->
    <div class="form-box">
        <form id="loginForm" onsubmit="return doLogin()">
            <p>Email * <input type="email" id="email" placeholder="your@email.com"></p>
            <p>Password * <input type="password" id="password" placeholder="Enter your password"></p>
            <button type="submit">Login</button>
            <div class="register-link">
                <p>New seller? <a href="upload.html">Register here</a></p>
            </div>
        </form>
    </div>

    <!-- Wrapped footer content -->
    <div class="footer">
        <p>© 2026 Used Car Marketplace</p>
    </div>
</div>

<script>
function doLogin() {
    var e = document.getElementById("email").value;
    var p = document.getElementById("password").value;
    
    if (e == "" || p == "") {
        alert("Please fill in all fields!");
        return false;
    }
    
    alert("Login successful! You can now upload cars.");
    window.location = "upload.html";
    return false;
}
</script>

</body>
</html>
