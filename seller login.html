<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- Character encoding to prevent garbled text -->
<title>Seller Login</title>
<style>
/* Global style reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #eee;
    /* Changed background color to soft gray*/
    padding: 20px;
    /* Added padding so content doesn't stick to browser edges */

    /* NEW: Make body full height and center content (beginner style) */
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.container {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
}
.header {
    margin-bottom: 30px;
    padding-bottom: 15px;
    border-bottom: 1px solid #ccc;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo {
    font-size: 24px;
    font-weight: bold;
    color: blue;
    margin-bottom: 10px;
}
.nav-links a {
    color: blue;
    /* Changed link color to blue */
    text-decoration: none;
    margin-left: 20px;
}
.back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: blue;
    text-decoration: none;
}
h2 {
    color: black;
    margin-bottom: 20px;
    /* Changed from margin-top to margin-bottom */
    text-align: center;
    font-size: 28px;
}
.form-box {
    background: white;
    padding: 50px;
    border-radius: 12px;
    box-shadow: 0 4px 10px #ccc;
}
.form-inner {
    max-width: 400px;
    margin: 0 auto;
}
input {
    border: 1px solid #ccc;
    /* Changed border color to softer gray */
    padding: 16px;
    /* Added small padding */
    width: 100%;
    margin-top: 5px;
    border-radius: 6px;
    font-size: 16px;
}
input:focus {
    outline: none;
    border-color: blue;
}
button {
    background: blue;
    /* Changed button color to match links */
    color: white;
    padding: 16px;
    /* Added small padding*/
    border: none;
    border-radius: 6px;
    width: 100%;
    margin-top: 15px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
}
button:hover {
    background: darkblue;
}
.register-link {
    text-align: center;
    margin-top: 20px;
}
.footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #ccc;
    color: #777;
    font-size: 14px;
}
.form-item {
    margin-bottom: 30px;
}
.form-item label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>
<body>

<div class="container">
    <!-- Wrapped header content -->
    <div class="header">
        <p class="logo">CarMarket</p>
        <div class="nav-links">
            <a href="search.html">Browse Cars</a>
            <a href="upload.html">Upload Car</a>
        </div>
    </div>

    <a href="search.html" class="back-link">← Back to Search</a>
    <br><br> 

    <h2>Seller Login</h2>
    <!-- Wrapped form in white box -->
    <div class="form-box">
        <div class="form-inner">
            <form id="loginForm" onsubmit="return doLogin()">
                <div class="form-item">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
                <div class="form-item">
                    <label>Password *</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                <button type="submit">Login to Seller Account</button>
                <div class="register-link">
                    <p>New seller? <a href="upload.html">Register here</a></p>
                </div>
            </form>
        </div>
    </div>


</div>

<script>
function doLogin() {
    var e = document.getElementById("email").value;
    var p = document.getElementById("password").value;
    
    if (e == "" || p == "") {
        alert("Please fill in all fields!");
        return false;
    }
    
    alert("Login successful! You can now upload cars.");
    window.location = "upload.html";
    return false;
}
</script>

</body>
</html>
